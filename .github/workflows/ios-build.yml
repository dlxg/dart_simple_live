名字: Build iOS

on:
  workflow_dispatch:
  push:
    分支:
      - main
      - master

作业:
  build-ios:
    runs-on: macos-latest

    steps:
      - 名字: Checkout code
        uses: actions/checkout@v4

      - 名字: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          channel: stable

      - 名字: Flutter doctor
        run: flutter doctor -v

      - 名字: Get dependencies
        run: |
          cd simple_live_app
          flutter pub get

      - 名字: Build iOS (no codesign)
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign

      - 名字: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          名字: ios-build
          path: simple_live_app/build/ios
